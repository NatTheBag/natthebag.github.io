    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0c0c0b;
            --surface:   #131310;
            --surface2:  #191916;
            --border:    #222220;
            --border2:   #2e2e2a;
            --muted:     #484840;
            --dim:       #7a7a70;
            --text:      #cec9be;
            --bright:    #edeae2;
            --accent:    #c8a86b;
            --accent2:   #8fb89a;
            --mono:      'DM Mono', monospace;
            --serif:     'Newsreader', Georgia, serif;
            --radius:    4px;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--serif);
            font-size: 16px;
            line-height: 1.72;
            min-height: 100vh;
        }

        /* subtle grain */
        body::after {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 9000;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* ── NAV BAR ───────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }

        .topbar-logo {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--dim);
            cursor: pointer;
            transition: color 0.2s;
            text-decoration: none;
        }
        .topbar-logo:hover { color: var(--accent); }

        .topbar-nav {
            display: flex;
            gap: 0;
            align-items: center;
        }

        .tab-link {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--dim);
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: var(--radius);
            transition: color 0.2s, background 0.2s;
            text-decoration: none;
        }
        .tab-link:hover { color: var(--text); }

        /* ── HEADER ────────────────────────────── */
        .header {
            padding: 52px 0 36px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-family: var(--serif);
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--bright);
            letter-spacing: -0.01em;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 0.92rem;
            color: var(--dim);
            font-style: italic;
            line-height: 1.55;
        }

        /* ── STATS ──────────────────────────────── */
        .stats-section {
            padding: 40px 0;
            border-bottom: 1px solid var(--border);
        }

        .section-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 300;
            color: var(--bright);
            margin-bottom: 6px;
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--dim);
        }

        /* ── FILTER ─────────────────────────────── */
        .filter-section {
            padding: 40px 0;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .filter-btn {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--dim);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            color: var(--text);
            border-color: var(--border2);
        }

        .filter-btn.active {
            color: var(--bright);
            background: var(--surface2);
            border-color: var(--accent);
        }

        /* ── CONCEPTS GRID ──────────────────────── */
        .concepts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            padding: 40px 0;
        }

        .concept-card {
            background: var(--surface);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: fadeUp 0.35s ease both;
        }

        .concept-card:hover {
            transform: translateY(-4px);
            border-color: var(--border2);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .concept-header {
            padding: 24px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .concept-header:hover .concept-title {
            color: var(--accent);
        }

        .concept-title {
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--bright);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: color 0.2s;
        }

        .concept-badge {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(200,168,107,0.1);
            border: 1px solid rgba(200,168,107,0.25);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .concept-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-item {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--dim);
        }

        .confidence-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 14px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
            border-radius: 2px;
        }

        .priority-badge {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .priority-high {
            background: rgba(220, 53, 69, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .priority-medium {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .priority-low {
            background: rgba(143,184,154,0.15);
            color: var(--accent2);
            border: 1px solid rgba(143,184,154,0.3);
        }

        /* ── RESOURCES CONTENT ──────────────────── */
        .resources-content {
            padding: 24px;
            display: none;
        }

        .resources-content.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .resource-section {
            margin-bottom: 24px;
        }

        .resource-section h3 {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .resource-list {
            list-style: none;
            padding: 0;
        }

        .resource-list li {
            padding: 8px 0;
            padding-left: 16px;
            position: relative;
            color: var(--text);
            font-size: 0.9rem;
        }

        .resource-list li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--dim);
        }

        .resource-link {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .resource-link:hover {
            color: var(--bright);
        }

        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .topic-tag {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.1em;
            background: var(--surface2);
            color: var(--dim);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border2);
        }

        .practice-btn {
            width: 100%;
            padding: 12px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .practice-btn:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* ── FOOTER ─────────────────────────────── */
        footer {
            margin-top: 60px;
            padding: 28px 0 36px;
            border-top: 1px solid var(--border);
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer-copy {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .footer-email a {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-email a:hover { color: var(--accent); }

        /* ── RESPONSIVE ──────────────────────────── */
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .concepts-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>

        function getPriorityClass(confidence) {
            if (confidence < 0.4) return { class: 'priority-high', text: 'High Priority' };
            if (confidence < 0.45) return { class: 'priority-medium', text: 'Medium Priority' };
            return { class: 'priority-low', text: 'Low Priority' };
        }

        function renderStats(data) {
            const totalQuestions = Object.values(data).reduce((sum, c) => sum + c.questionCount, 0);
            const avgConfidence = Object.values(data).reduce((sum, c) => sum + c.avgConfidence, 0) / Object.keys(data).length;
            const totalConcepts = Object.keys(data).length;

            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalQuestions.toLocaleString()}</div>
                    <div class="stat-label">Total Questions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalConcepts}</div>
                    <div class="stat-label">Concepts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${(avgConfidence * 100).toFixed(0)}%</div>
                    <div class="stat-label">Avg Confidence</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">5</div>
                    <div class="stat-label">Categories</div>
                </div>
            `;

            document.getElementById('stats-grid').innerHTML = statsHTML;
        }

        function renderConcept(conceptName, data) {
            const priority = getPriorityClass(data.avgConfidence);
            const displayName = conceptName.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

            return `
                <div class="concept-card" data-category="${data.category}">
                    <div class="concept-header" onclick="toggleResources('${conceptName}')">
                        <div class="concept-title">
                            <span>${displayName}</span>
                            <span class="concept-badge">${data.questionCount} questions</span>
                        </div>
                        <div class="concept-meta">
                            <div class="meta-item">
                                Confidence: ${(data.avgConfidence * 100).toFixed(0)}%
                            </div>
                            <span class="priority-badge ${priority.class}">${priority.text}</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${data.avgConfidence * 100}%"></div>
                        </div>
                    </div>

                    <div class="resources-content" id="resources-${conceptName}">
                        <div class="resource-section">
                            <h3>Textbook Chapters</h3>
                            <ul class="resource-list">
                                ${data.textbooks.map(tb => `<li>${tb}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="resource-section">
                            <h3>Online Resources</h3>
                            <ul class="resource-list">
                                ${data.online.map(resource => `
                                    <li><a href="${resource.url}" class="resource-link" target="_blank">${resource.name}</a></li>
                                `).join('')}
                            </ul>
                        </div>

                        <div class="resource-section">
                            <h3>Key Topics</h3>
                            <div class="topic-tags">
                                ${data.topics.map(topic => `<span class="topic-tag">${topic}</span>`).join('')}
                            </div>
                        </div>

                        <button class="practice-btn" onclick="practice('${conceptName}')">
                            Practice ${data.questionCount} Questions
                        </button>
                    </div>
                </div>
            `;
        }

        function toggleResources(conceptId) {
            const element = document.getElementById(`resources-${conceptId}`);
            element.classList.toggle('active');
        }

        function practice(conceptName) {
            alert(`Practice mode for ${conceptName} coming soon!`);
        }

        function filterConcepts(category) {
            const cards = document.querySelectorAll('.concept-card');
            
            cards.forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function init() {
            renderStats(conceptsData);

            const conceptsHTML = Object.entries(conceptsData)
                .map(([name, data]) => renderConcept(name, data))
                .join('');

            document.getElementById('concepts-grid').innerHTML = conceptsHTML;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const category = e.target.dataset.category;
                    filterConcepts(category);
                });
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
